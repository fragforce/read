name: SonarCloud Analysis

on:
  workflow_run:
    workflows: ["Coverage"]
    types:
      - completed

jobs:
  sonar:
    name: SonarCloud scan
    if: github.repository == 'fragforce/read' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ secrets.FRAGFORCE_CI_APP_ID }}
          private-key: ${{ secrets.FRAGFORCE_CI_PRIVATE_KEY }}

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Set scan properties
        run: |
          PR_NUMBER=$(tr -dc '0-9' < pr_number.txt)
          PR_BASE=$(tr -dc 'A-Za-z0-9/_.-' < pr_base_ref.txt)
          BRANCH=$(tr -dc 'A-Za-z0-9/_.-' < branch_name.txt)
          echo "SONAR_PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "SONAR_PR_BASE=$PR_BASE" >> "$GITHUB_ENV"
          echo "SONAR_BRANCH_NAME=$BRANCH" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: SonarCloud Scan (push)
        if: github.event.workflow_run.event != 'pull_request'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: -Dsonar.branch.name=${{ env.SONAR_BRANCH_NAME }}

      - name: SonarCloud Scan (pull request)
        id: sonar-scan
        if: github.event.workflow_run.event == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: >-
            -Dsonar.pullrequest.key=${{ env.SONAR_PR_NUMBER }}
            -Dsonar.pullrequest.branch=${{ github.event.workflow_run.head_branch }}
            -Dsonar.pullrequest.base=${{ env.SONAR_PR_BASE }}

      - name: Create SonarCloud quality gate check run
        if: github.event.workflow_run.event == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SCAN_CONCLUSION: ${{ steps.sonar-scan.conclusion }}
          PR_NUMBER: ${{ env.SONAR_PR_NUMBER }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$SCAN_CONCLUSION" = "success" ]; then
            CONCLUSION="success"
            TITLE="Quality Gate passed"
          else
            CONCLUSION="failure"
            TITLE="Quality Gate failed"
          fi
          gh api "repos/$REPO/check-runs" \
            --method POST \
            -f name="SonarCloud Quality Gate" \
            -f head_sha="$HEAD_SHA" \
            -f status="completed" \
            -f conclusion="$CONCLUSION" \
            -f "output[title]=$TITLE" \
            -f "output[summary]=See [SonarCloud dashboard](https://sonarcloud.io/dashboard?id=fragforce_read&pullRequest=$PR_NUMBER) for details."
