services:
  web:
    build: .
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18.3
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: fragforce_read
      POSTGRES_USER: fragforce
      POSTGRES_PASSWORD: fragforce
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fragforce -d fragforce_read"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
