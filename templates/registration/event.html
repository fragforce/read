{% extends "base.html" %}

{% block title %}Register - Fragforce Reads{% endblock %}

{% block content %}
<div class="card">
    <h2>Narrator Registration</h2>
    <p>Enter the event code displayed at the recording session to register as a narrator.</p>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="code">Event Code</label>
        <input type="text" id="code" name="code" autocomplete="off" required>

        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Register</button>
        </div>
    </form>
</div>
{% endblock %}
