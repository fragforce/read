<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <link href="https://fonts.googleapis.com/css?family=Oswald|Roboto:300,400,500" rel="stylesheet">
    <title>{% block title %}Fragforce Reads{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #253137;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Oswald', sans-serif;
            color: #46a4e8;
        }

        h2 {
            border-bottom: 2px solid #46a4e8;
            padding-bottom: 4px;
            margin-bottom: 1rem;
        }

        a, a:visited {
            color: #46a4e8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        header {
            background-color: #37474f;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        header h1 {
            font-size: 1.5rem;
            color: #ffffff;
        }

        .nav-icon {
            color: #46a4e8;
        }

        .nav-icon:hover {
            color: #5bb5f5;
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        footer {
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
        }

        .card {
            background-color: #253137;
            border: none;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/">
                <h1>Fragforce Reads</h1>
            </a>
            <a href="https://github.com/fragforce/read" rel="noopener noreferrer" target="_blank" class="nav-icon" aria-label="GitHub">
                <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; Fragforce Elder Council | <a href="https://fragforce.org">fragforce.org</a></p>
    </footer>
</body>
</html>
